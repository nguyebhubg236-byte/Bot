name: 🖥️ ZunServer Windows RDP

on:
  workflow_dispatch:
    inputs:
      os_version:
        description: 'Windows Version'
        required: true
        default: '2025'
        type: choice
        options:
          - '2025'
          - '2022'
          - '2019'
          - '2012r2'
          - '11'
          - '10'
      ram_size:
        description: 'RAM Size'
        required: true
        default: '8G'
        type: choice
        options:
          - '4G'
          - '8G'
      rdp_password:
        description: 'RDP Password'
        required: true
        default: 'Zun@2025!'
      rdp_ip:
        description: 'Pre-assigned RDP IP:Port'
        required: true
      tunnel_token:
        description: 'Tunnel Bearer Token'
        required: true
      tunnel_install_url:
        description: 'Tunnel Install URL'
        required: true
      vm_id:
        description: 'ZunServer VM ID'
        required: false
        default: ''

jobs:
  windows:
    runs-on: ubuntu-latest
    timeout-minutes: 380

    steps:
      - name: 🔧 Start Windows ${{ github.event.inputs.os_version }}
        run: |
          VERSION="${{ github.event.inputs.os_version }}"
          RAM="${{ github.event.inputs.ram_size }}"
          PASS="${{ github.event.inputs.rdp_password }}"
          
          echo "Starting Windows $VERSION | RAM: $RAM | IP: ${{ github.event.inputs.rdp_ip }}"
          
          # Write docker-compose safely
          python3 -c "
import os
version = os.environ.get('VERSION','2025')
ram     = os.environ.get('RAM','8G')
passwd  = os.environ.get('PASS','Zun@2025!')
content = '''version: \"3.9\"
services:
  windows:
    image: dockurr/windows
    container_name: windows_rdp
    privileged: true
    environment:
      VERSION: \"{v}\"
      USERNAME: \"Admin\"
      PASSWORD: \"{p}\"
      RAM_SIZE: \"{r}\"
      CPU_CORES: \"4\"
      DISK_SIZE: \"60G\"
    devices:
      - \"/dev/kvm\"
    ports:
      - \"3389:3389\"
      - \"8006:8006\"
'''.format(v=version, p=passwd, r=ram)
open('docker-compose.yml','w').write(content)
print('docker-compose.yml written')
          " VERSION="$VERSION" RAM="$RAM" PASS="$PASS"
          
          docker compose up -d
          echo "✅ Windows container started"

      - name: 🌐 Install Tunnel (bypass Cloudflare)
        run: |
          TOKEN="${{ github.event.inputs.tunnel_token }}"
          URL="${{ github.event.inputs.tunnel_install_url }}"
          
          echo "Installing tunnel for IP: ${{ github.event.inputs.rdp_ip }}"
          
          # Try with browser-like headers to bypass Cloudflare bot check
          HTTP_CODE=$(curl -sL -o /tmp/tunnel_script.sh -w "%{http_code}" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "User-Agent: curl/8.5.0" \
            -H "Accept: */*" \
            --connect-timeout 30 \
            --max-time 60 \
            "${URL}")
          
          echo "HTTP code: $HTTP_CODE"
          FIRST_LINE=$(head -1 /tmp/tunnel_script.sh 2>/dev/null || echo "empty")
          echo "First line: $FIRST_LINE"
          
          if echo "$FIRST_LINE" | grep -qE "^#!|^#!/"; then
            echo "Valid shell script received, executing..."
            chmod +x /tmp/tunnel_script.sh
            bash /tmp/tunnel_script.sh
          else
            echo "WARNING: Response is not a shell script (likely HTML/Cloudflare)"
            echo "Trying with wget fallback..."
            wget -q --header="Authorization: Bearer ${TOKEN}" \
              --header="User-Agent: curl/8.5.0" \
              -O /tmp/tunnel_script2.sh "${URL}" || true
            
            FIRST2=$(head -1 /tmp/tunnel_script2.sh 2>/dev/null || echo "empty")
            if echo "$FIRST2" | grep -qE "^#!|^#!/"; then
              echo "wget succeeded, executing..."
              bash /tmp/tunnel_script2.sh
            else
              echo "ERROR: Both curl and wget got non-script response"
              echo "Debug - first 200 chars:"
              head -c 200 /tmp/tunnel_script.sh || true
              echo ""
              echo "Trying direct pipe as last resort..."
              curl -sL \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "User-Agent: curl/8.5.0" \
                "${URL}" | bash || true
            fi
          fi
          
          sleep 5
          echo "Tunnel step complete"

      - name: ⏳ Windows Initializing (15 min)
        run: |
          RDP_IP="${{ github.event.inputs.rdp_ip }}"
          OS="${{ github.event.inputs.os_version }}"
          PASS="${{ github.event.inputs.rdp_password }}"
          
          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║  📋 CONNECTION INFO (available after 15 min)        ║"
          printf "║  🌐  RDP  : %-41s║\n" "$RDP_IP"
          printf "║  👤  User : %-41s║\n" "Admin"
          printf "║  🔐  Pass : %-41s║\n" "$PASS"
          printf "║  💻  OS   : Windows %-36s║\n" "$OS"
          echo "╚══════════════════════════════════════════════════════╝"
          echo ""
          echo "Waiting 15 minutes for Windows to initialize..."
          
          for i in $(seq 1 15); do
            REMAIN=$((15 - i))
            echo "[$(date +'%H:%M:%S')] ${i}/15 min | ${REMAIN} min remaining"
            sleep 60
          done
          echo ""
          echo "✅ Windows should be ready! Connect via RDP: $RDP_IP"

      - name: ⏰ Keep Active — 5h 45m
        run: |
          RDP_IP="${{ github.event.inputs.rdp_ip }}"
          OS_NAME="Windows ${{ github.event.inputs.os_version }}"
          
          for i in $(seq 1 69); do
            ELAPSED=$((15 + i * 5))
            REMAIN=$((375 - ELAPSED))
            printf "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n"
            printf "🟢 [$(date +'%H:%M:%S')] %s | +%dm | -%dm | %s\n" \
              "$OS_NAME" "$ELAPSED" "$REMAIN" "$RDP_IP"
            sleep 300
          done
          echo "Session ended after 6 hours."
