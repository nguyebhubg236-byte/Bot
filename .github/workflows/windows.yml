name: Windows RDP - ZunServer

on:
  workflow_dispatch:
    inputs:
      os_version:
        description: 'Windows Version'
        required: true
        default: '2025'
        type: choice
        options: ['2025', '2022', '2019', '2012r2', '11', '10']
      ram_size:
        description: 'RAM'
        required: true
        default: '8G'
        type: choice
        options: ['4G', '8G']
      rdp_password:
        description: 'RDP Password'
        required: true
        default: 'Zun@2025!'
      rdp_ip:
        description: 'Pre-assigned RDP IP:Port'
        required: true
      tunnel_token:
        description: 'Tunnel Bearer Token'
        required: true
      tunnel_install_url:
        description: 'Tunnel Install URL'
        required: true
      vm_id:
        description: 'ZunServer VM ID'
        required: false
        default: ''

jobs:
  windows:
    runs-on: ubuntu-latest
    timeout-minutes: 380

    steps:
      - name: Start Windows via Docker
        env:
          OS_VERSION: ${{ github.event.inputs.os_version }}
          RAM_SIZE: ${{ github.event.inputs.ram_size }}
          RDP_PASS: ${{ github.event.inputs.rdp_password }}
        run: |
          echo "OS=$OS_VERSION RAM=$RAM_SIZE IP=${{ github.event.inputs.rdp_ip }}"

          cat <<DCEOF > docker-compose.yml
          version: "3.9"
          services:
            windows:
              image: dockurr/windows
              container_name: windows_rdp
              privileged: true
              environment:
                VERSION: "${OS_VERSION}"
                USERNAME: "Admin"
                PASSWORD: "${RDP_PASS}"
                RAM_SIZE: "${RAM_SIZE}"
                CPU_CORES: "4"
                DISK_SIZE: "60G"
              devices:
                - "/dev/kvm"
              ports:
                - "3389:3389"
                - "8006:8006"
          DCEOF

          docker compose up -d
          echo "Windows container started"

      - name: Install Tunnel
        env:
          TUN_TOKEN: ${{ github.event.inputs.tunnel_token }}
          TUN_URL: ${{ github.event.inputs.tunnel_install_url }}
        run: |
          echo "Installing tunnel for: ${{ github.event.inputs.rdp_ip }}"

          # Download script and verify it's a shell script before running
          curl -sL \
            -H "Authorization: Bearer ${TUN_TOKEN}" \
            -H "User-Agent: curl/8.5.0" \
            --retry 3 --retry-delay 5 \
            -o /tmp/tun.sh \
            "${TUN_URL}"

          FLINE=$(head -1 /tmp/tun.sh 2>/dev/null || echo "")
          echo "Response first line: $FLINE"

          if echo "$FLINE" | grep -qE '^#!'; then
            echo "Valid script, executing..."
            chmod +x /tmp/tun.sh
            bash /tmp/tun.sh
          else
            echo "Got HTML (Cloudflare block). Trying wget..."
            wget -q \
              --header="Authorization: Bearer ${TUN_TOKEN}" \
              --header="User-Agent: curl/8.5.0" \
              -O /tmp/tun2.sh "${TUN_URL}"
            FLINE2=$(head -1 /tmp/tun2.sh 2>/dev/null || echo "")
            if echo "$FLINE2" | grep -qE '^#!'; then
              bash /tmp/tun2.sh
            else
              echo "Both attempts got non-script response. Dumping first 300 chars:"
              head -c 300 /tmp/tun.sh || true
              exit 1
            fi
          fi

          sleep 5
          echo "Tunnel installed"

      - name: Wait 15min (Windows boot)
        env:
          RDP_IP: ${{ github.event.inputs.rdp_ip }}
          RDP_PASS: ${{ github.event.inputs.rdp_password }}
          OS_VER: ${{ github.event.inputs.os_version }}
        run: |
          echo ""
          echo "============================================"
          echo "  RDP Address : $RDP_IP"
          echo "  Username    : Admin"
          echo "  Password    : $RDP_PASS"
          echo "  OS          : Windows $OS_VER"
          echo "  Waiting 15min for Windows to boot..."
          echo "============================================"
          for i in $(seq 1 15); do
            echo "[$(date +'%H:%M:%S')] $i/15 min..."
            sleep 60
          done
          echo "Ready! Connect via RDP: $RDP_IP"

      - name: Keep alive 5h45m
        env:
          RDP_IP: ${{ github.event.inputs.rdp_ip }}
          OS_VER: ${{ github.event.inputs.os_version }}
        run: |
          for i in $(seq 1 69); do
            E=$((15+i*5)); R=$((375-E))
            echo "[$(date +'%H:%M:%S')] Windows $OS_VER | +${E}m | -${R}m | $RDP_IP"
            sleep 300
          done
          echo "Session ended."
